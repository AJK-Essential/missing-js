name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Monorepo
        # This builds your libraries in /packages and /internal first
        run: npm run build

      - name: Build Angular Demo
        # This specifically builds the demo with the correct base-href for GH Pages
        run: npm run build --workspace=angular-demo -- --configuration=production --base-href=/missing-js/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Using the exact path you provided
          path: './examples/angular-demo/dist/angular-demo/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
