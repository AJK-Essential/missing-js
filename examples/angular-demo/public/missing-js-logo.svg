<svg viewBox="0 0 410 120" xmlns="http://www.w3.org/2000/svg" alt="An animated monochromatic logo for Missing-JS, featuring pulsing industrial bars and breathing text.">
  <title id="logoTitle">MJS Logo</title>
  <desc id="logoDesc">An animated monochromatic logo for Missing-JS, featuring pulsing industrial bars and breathing text.</desc>
  <style>
    /* Industrial Monochromatic Palette */
    :root {
      --light-grey: #c7c7c7;
      --deep-purple: #22194d;
    }

    /* Glow Filter */
    #mjs-glow {
      --glow-color: rgba(199, 199, 199, 0.4);
    }

    .mjs-bar {
      fill: url(#mjs-gradient);
      transform-origin: center;
    }

    .mjs-path {
      fill: url(#mjs-gradient);
    }

    .b1 { animation-delay: 0s; }
    .b2-t, .b2-b { animation-delay: 0.5s; }
    .b3 { animation-delay: 1s; }
    .b4 { animation-delay: 1.5s; }

    .ghost { 
      opacity: 0.25; 
    }

    .mjs-sub {
      fill: #c7c7c7;
      font-family: 'Courier New', monospace;
      font-size: 8.5px;
      letter-spacing: 4px;
      opacity: 0.4;
    }
  </style>

  <defs>
    <linearGradient id="mjs-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7c7c7" />
      <stop offset="50%" stop-color="#c7c7c7" />
      <stop offset="100%" stop-color="#22194d" />
    </linearGradient>

  </defs>

  <g transform="translate(10, 20)">
    <rect class="mjs-bar b1" x="0" y="0" width="10" height="70" rx="3" />
    <rect class="mjs-bar b2-t" x="20" y="0" width="10" height="25" rx="3" />
    <rect class="mjs-bar b2-b ghost" x="20" y="45" width="10" height="25" rx="3" />
    <rect class="mjs-bar b3" x="40" y="15" width="10" height="55" rx="3" />
    <rect class="mjs-bar b4" x="60" y="0" width="10" height="70" rx="3" />
  </g>

