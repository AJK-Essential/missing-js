<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <!-- Beautiful loader and redirect logic -->
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f2f5;
      font-family: Arial, sans-serif;
    }
    .loader-container {
      text-align: center;
    }
    .loader {
      border: 16px solid #f3f3f3;
      border-top: 16px solid #3498db;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      animation: spin 2s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .message {
      font-size: 1.2rem;
      color: #333;
    }
    .new-url {
      color: #3498db;
      font-weight: bold;
    }
  </style>
  <script>
    setTimeout(function() {
      window.location.href = "https://unik-arch.github.io/unik-ui/";
    }, 5000); // 5 seconds delay
  </script>
</head>
<body>
  <div class="loader-container">
    <div class="loader"></div>
    <p class="message">The demo has moved to our new ecosystem Unik-Arch <br> You are being redirected to: <span class="new-url">https://unik-arch.github.io/unik-ui/</span></p>
  </div>
</body>
</html>
